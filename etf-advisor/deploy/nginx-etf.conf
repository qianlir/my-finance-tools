server {
    listen 8088;
    server_name _;

    root /opt/etf-advisor/web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Admin API → proxy to admin_server.py
    location /admin/api/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    # Admin 页面
    location /admin/ {
        try_files $uri /admin.html;
    }

    # 动态数据：不缓存
    location /data/ {
        alias /opt/etf-advisor/data/;
        add_header Cache-Control "no-store";
        add_header Access-Control-Allow-Origin "*";
    }

    # app.js / rotation.js 频繁更新，短缓存
    location ~* ^/(app|rotation|data)\.js$ {
        expires 1h;
    }

    # 静态资源：长期缓存
    location /vendor/ {
        expires 30d;
    }
    location ~* \.(css)$ {
        expires 7d;
    }
}
