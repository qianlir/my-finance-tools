server {
    listen 8088;
    server_name _;

    root /opt/etf-advisor/web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 动态数据：不缓存
    location /data/ {
        alias /opt/etf-advisor/data/;
        add_header Cache-Control "no-store";
        add_header Access-Control-Allow-Origin "*";
    }

    # 静态资源：长期缓存
    location /vendor/ {
        expires 30d;
    }
    location ~* \.(css|js)$ {
        expires 7d;
    }
}
