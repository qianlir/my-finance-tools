<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETF溢价分析报告 — 浏览器预览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, sans-serif; background: #f8f9fa; padding: 12px; }
  .container { max-width: 420px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; margin-bottom: 12px; }
  .title { font-size: 16px; font-weight: bold; color: #1a73e8; }
  .updated { font-size: 11px; color: #999; }
  .card { background: #fff; border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
  .futures-section { padding: 10px 12px; }
  .futures-row { font-size: 12px; line-height: 22px; }
  .futures-label { color: #666; }
  .red { color: #e53935; }
  .green { color: #43a047; }
  .divider { color: #ccc; }
  .freshness { margin-top: 4px; font-size: 11px; color: #999; padding-left: 8px; border-left: 2px solid #dadce0; }
  .section-title { font-size: 15px; font-weight: bold; color: #333; padding: 10px 12px 8px; }
  .table-wrapper { display: flex; border-top: 1px solid #e0e0e0; overflow-x: auto; }
  .fixed-col { flex-shrink: 0; width: 56px; border-right: 2px solid #1a73e8; background: #fff; }
  .fixed-th { background: #1a73e8; color: #fff; font-weight: bold; font-size: 10px; padding: 6px 3px; text-align: center; }
  .fixed-td { padding: 6px 3px; text-align: center; border-bottom: 1px solid #f0f0f0; }
  .code-text { font-weight: bold; font-size: 11px; }
  .scroll-area { flex: 1; overflow-x: auto; }
  .scroll-inner { min-width: max-content; }
  .row { display: flex; }
  .header-row .cell { background: #1a73e8; color: #fff; font-weight: bold; }
  .cell { flex-shrink: 0; width: 68px; padding: 6px 3px; font-size: 11px; text-align: center; border-bottom: 1px solid #f0f0f0; }
  .cell.wide { width: 115px; }
  .cell.narrow { width: 42px; }
  .cell.rec-col { width: 96px; font-size: 10px; }
  .rec-top { background: #e8f5e9; }
  .rec-good { background: #fff8e1; }
  .section-notes { padding: 8px 12px 0; }
  .note { display: block; font-size: 11px; color: #666; line-height: 18px; padding-left: 8px; border-left: 2px solid #dadce0; margin-bottom: 4px; }
  .formula-notes { padding: 10px 12px; }
  .disclaimer { text-align: center; padding: 8px 0; font-size: 11px; color: #999; }
  .loading, .error { text-align: center; padding: 40px; color: #999; }
  #refresh-btn { position: fixed; bottom: 20px; right: 20px; padding: 10px 20px; background: #1a73e8; color: #fff; border: none; border-radius: 20px; cursor: pointer; }
</style>
</head>
<body>
<div class="container">
  <div id="app">
    <div class="loading">加载中...</div>
  </div>
</div>
<button id="refresh-btn" onclick="loadReport()">刷新</button>

<script>
function formatPercent(v) { if (v == null) return 'N/A'; return (v > 0 ? '+' : '') + v.toFixed(2) + '%'; }
function formatPrice(v) { if (v == null) return 'N/A'; return v.toFixed(3); }
function formatInt(v) { if (v == null) return 'N/A'; return Math.round(v); }
function colorClass(v) { if (v > 0) return 'red'; if (v < 0) return 'green'; return ''; }
function recClass(s) { if (s >= 4) return 'rec-top'; if (s >= 2) return 'rec-good'; return ''; }
function recIcons(s) { return (s > 0 ? '\u2705'.repeat(s) : s < 0 ? '\u274C'.repeat(-s) : ''); }
function excessWithAvg(e, a) { return formatPercent(e) + '(' + formatPercent(a) + ')'; }

function renderETF(etf, colName) {
  return `
    <div class="row ${recClass(etf.stars)}">
      <div class="cell">${formatPrice(etf.price)}</div>
      <div class="cell ${colorClass(etf.change)}">${formatPercent(etf.change)}</div>
      <div class="cell ${colorClass(etf.display_premium)}">${formatPercent(etf.display_premium)}</div>
      <div class="cell wide ${colorClass(etf.excess_3m)}">${excessWithAvg(etf.excess_3m, etf.avg_3m)}</div>
      <div class="cell wide ${colorClass(etf.excess_6m)}">${excessWithAvg(etf.excess_6m, etf.avg_6m)}</div>
      <div class="cell wide ${colorClass(etf.excess_1y)}">${excessWithAvg(etf.excess_1y, etf.avg_1y)}</div>
      <div class="cell ${colorClass(etf.composite)}">${formatPercent(etf.composite)}</div>
      <div class="cell ${colorClass(etf.nav_return_1y)}">${formatPercent(etf.nav_return_1y)}</div>
      <div class="cell narrow">${etf.days_gt7}</div>
      <div class="cell narrow">${etf.score}</div>
      <div class="cell rec-col">${etf.recommendation} ${recIcons(etf.stars)}</div>
    </div>`;
}

function renderSection(section) {
  const correction = section.futures_correction;
  return `
    <div class="card">
      <div class="section-title">${section.index_name}ETF 分析</div>
      <div class="table-wrapper">
        <div class="fixed-col">
          <div class="fixed-th">代码</div>
          ${section.etfs.map(e => `<div class="fixed-td"><span class="code-text">${e.code}</span></div>`).join('')}
        </div>
        <div class="scroll-area">
          <div class="scroll-inner">
            <div class="row header-row">
              <div class="cell">价格</div><div class="cell">涨幅</div><div class="cell">${section.premium_col_name}</div>
              <div class="cell wide">3M超额(均值)</div><div class="cell wide">6M超额(均值)</div>
              <div class="cell wide">1Y超额(均值)</div><div class="cell">综合超额</div>
              <div class="cell">1Y净值</div>
              <div class="cell narrow">>7%天</div>
              <div class="cell narrow">分值</div>
              <div class="cell rec-col">推荐</div>
            </div>
            ${section.etfs.map(e => renderETF(e, section.premium_col_name)).join('')}
          </div>
        </div>
      </div>
      <div class="section-notes">
        <div class="note">基准涨幅: ${formatPercent(section.avg_change)}（${section.index_name}ETF均值）</div>
        ${correction ? `<div class="note">${correction.symbol}期货修正: 净值${correction.stale_days}天未更新，取最近${correction.correction_days}天期货</div>
        <div class="note">累计修正: ${formatPercent(correction.cumulative)}</div>` : ''}
      </div>
    </div>`;
}

function loadReport() {
  fetch('/report.json')
    .then(r => r.json())
    .then(data => {
      document.getElementById('app').innerHTML = `
        <div class="header">
          <div class="title">ETF溢价分析报告 ${data.date}</div>
          <div class="updated">${data.generated_at.split(' ')[1]} 更新</div>
        </div>
        <div class="card futures-section">
          ${data.futures.map(f => `
            <div class="futures-row">
              <span class="futures-label">期货 ${f.date}:</span>
              <span class="${colorClass(f.nq_change)}">NQ ${formatInt(f.nq_price)} (${formatPercent(f.nq_change)})</span>
              <span class="divider"> | </span>
              <span class="${colorClass(f.es_change)}">ES ${formatInt(f.es_price)} (${formatPercent(f.es_change)})</span>
            </div>`).join('')}
          ${data.data_freshness ? `<div class="freshness">${data.data_freshness}</div>` : ''}
        </div>
        ${data.sections.map(s => renderSection(s)).join('')}
        <div class="card formula-notes">
          ${data.formula_notes.map(n => `<div class="note">${n}</div>`).join('')}
        </div>
        <div class="disclaimer">以上是大模型瞎分析，不要参考，不构成投资建议。</div>
      `;
    })
    .catch(e => {
      document.getElementById('app').innerHTML = `<div class="error">加载失败: ${e.message}<br>请确保 HTTP 服务运行在端口 8080</div>`;
    });
}

loadReport();
setInterval(loadReport, 5 * 60 * 1000); // 5分钟自动刷新
</script>
</body>
</html>
